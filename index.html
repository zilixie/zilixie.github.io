<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/styles.css?v=1.0" type="text/css">
    
     <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
	<script src="scripts/showApplicants.js"></script>
    <title>TA applicants</title>
</head>

<body>
    <h1>TA applicants</h1>
    <div class="nav">
      <ul>
        <li class="menu" id = "1" onclick = myFunc(this.id)>Applicants</li>
        <li class="menu" id = "2" onclick = myFunc(this.id)>Applicants by status</li>
        <li class="menu" id = "3" onclick = myFunc(this.id)>Search by Family Name</li>
        <li class="menu" id = "4" onclick = myFunc(this.id)>Add applicant</li>
        <li class="menu" id = "5" onclick = myFunc(this.id)>Remove Applicant</li>
        <li class="menu" id = "6" onclick = myFunc(this.id)>Courses</li>
        <li class="menu" id = "7" onclick = myFunc(this.id)>Search for Course</li>
      </ul>
    </div>
    <div class = "inner">
    <a name="p1"></a>
    <!--<h2>Applicants by status</h2>-->
    <form id="status">
    <h2 id = "head1">Applicants</h2>
        <select id="selectStatus" onchange = "buildList();">
        <option value="All" id = "all">All</option>
        <option value="Undergrad">Undergrad</option>
        <option value="MSc">MSc</option>
        <option value="PhD">PhD</option>
        <option value="MScAC">MScAC</option>
        <option value="MEng">MEng</option>
        </select>
    <table id="myTable">
    </table>
    </form>

    <a name="p2"></a>

    <form id="search" style="display: none;">
    <h2>Search by Family Name</h2>
    <input type="text" id="fname"></input>

    <input id="searchButton" type="button" value="Search"> 

    <ul id="myTable2" style="list-style-type:none;">
    </ul>  
    </form>

    <a name="p3"></a>    

    <form id="add" method="post">
    <h2>Add applicant</h2>
        <label id="stunumField">
            <span class="label">Student Number: </span>
            <input type="text" id="stunum" name="stunum"></input>
        </label>
        
        <label id="givennameField">
            <span class="label">Given Name: </span>
            <input type="text" id="givenname" name="givenname"></input>
        </label>

        <label id="familynameField">
            <span class="label">Family Name: </span>
            <input type="text" id="familyname" name="familyname"></input>
        </label>

        <!--<label id="statusField">
            <span class="label">Status: </span>
            <input type="text" id="status" name="status"></input>
        </label>-->
        <label id="statusField">
        <span class="label">Status: </span>
        <select id="select">
        <option value="Undergrad" selected="selected">Undergrad</option>
        <option value="MSc">MSc</option>
        <option value="PhD">PhD</option>
        <option value="MScAC">MScAC</option>
        <option value="MEng">MEng</option>
        </select>
        </label>


        <label id="yearField">
            <span class="label">Year: </span>
            <input type="text" id="year" name="year"></input>
        </label>

        <label>
            <span class="label">Code: </span>
            <input type="text" id="code" name="code"></input>
        </label>
        
        <label>
            <span class="label">Ranking: </span>
            <input type="text" id="rank" name="rank"></input>
        </label>

        <label>
            <span class="label">Experience: </span>
            <input type="text" id="exp" name="experience"></input>
        </label>

    <span id="addinput"></span>

    <input id="addButton" type="button" value="Submit">

    <input id="addCourse" type="button" value="Add Course" style="margin-left:30px">
    </form>

    <a name="p4"></a>    
    <form id="rmbyname" method="post">
    <h2>Remove Applicant</h2>
        <label>
            <span class="label">Family Name to Remove:</span>
            <input type="text" id="removefname" name="removefname"></input>
            <input id="fnrmButton" type="button" value="Submit" style="margin-left: 30px;">
        </label>
    </form>

    <form id="rmbynum" method="post">
        <label>
            <span class="label">Student Number to Remove:</span>
            <input type="text" id="removesnum" name="removesnum"></input>
            <input id="snrmButton" type="button" value="Submit" style="margin-left: 30px;">
        </label>
    </form>


    <a name="p5"></a>

    <form id="cs">
    <h2 id="head2">Search for Course</h2>

    <input type="text" id="typeCourse"  ></input>

    <input id="btn" type="button" value="Search" style="margin-left: 30px;"> 

    <table id="myTable3" style="margin-top:30px;">
    </table>
    </form>
</div>
</body>
</html>
